name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["master", "main"]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      
      - name: Restore
        run: dotnet restore StartLine.slnx
      
      - name: Build
        run: dotnet build StartLine.slnx --no-restore -c Release
      
      - name: Test
        run: dotnet test StartLine.slnx --no-build -c Release --verbosity normal
